<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 80" shape-rendering="geometricPrecision">
  <rect width="200" height="80" rx="8" fill="#1B1F3B"/>
  <!-- Geometric line decorations top-right -->
  <line x1="148" y1="8" x2="172" y2="8" stroke="#C8E628" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="163" y1="8" x2="185" y2="30" stroke="#C8E628" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Bottom-left geometric lines -->
  <line x1="15" y1="72" x2="38" y2="72" stroke="#C8E628" stroke-width="2" stroke-linecap="round" opacity="0.5"/>
  <line x1="15" y1="72" x2="15" y2="58" stroke="#C8E628" stroke-width="2" stroke-linecap="round" opacity="0.5"/>
  <!-- TEN text (white) -->
  <text x="22" y="53" font-family="Arial Black, Arial, sans-serif" font-weight="900" font-size="34" fill="#FFFFFF" letter-spacing="-1">TEN</text>
  <!-- UP text (yellow-green) -->
  <text x="104" y="53" font-family="Arial Black, Arial, sans-serif" font-weight="900" font-size="34" fill="#C8E628" letter-spacing="-1">UP</text>
</svg>
