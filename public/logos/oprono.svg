<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Background circle -->
  <circle cx="50" cy="50" r="50" fill="#A89BD6"/>
  <!-- Red/coral diagonal bar (stem of the p) -->
  <rect x="44" y="12" width="16" height="62" rx="8" ry="8"
        fill="#C85A4A"
        transform="rotate(-15 52 43)"/>
  <!-- Purple bowl circle -->
  <circle cx="55" cy="57" r="20" fill="#7B6BBF"/>
  <!-- Inner cutout to make it look like a p bowl -->
  <circle cx="55" cy="57" r="12" fill="#A89BD6"/>
</svg>
