<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>404 — Page introuvable</title>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Fraunces:ital,opsz,wght@1,9..144,300&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --cream: #f7f3ec;
      --ink: #1a1a1a;
      --mid: #4a4540;
      --low: #7a7068;
      --border: #d8cfc2;
      --lilas: #7c3aed;
      --lilas-d: rgba(124,58,237,0.08);
      --lilas-b: rgba(124,58,237,0.18);
      --white: #ffffff;
    }
    body {
      font-family: 'Plus Jakarta Sans', sans-serif;
      background: var(--cream);
      color: var(--ink);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .container {
      max-width: 480px;
      width: 100%;
      text-align: center;
    }
    .eyebrow {
      font-size: 10px;
      letter-spacing: 4px;
      text-transform: uppercase;
      color: var(--lilas);
      font-weight: 700;
      margin-bottom: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }
    .eyebrow::before, .eyebrow::after {
      content: '';
      width: 24px;
      height: 1px;
      background: var(--lilas);
      opacity: 0.5;
    }
    .code {
      font-size: clamp(80px, 18vw, 120px);
      font-weight: 800;
      line-height: 1;
      margin-bottom: 16px;
      color: var(--ink);
      letter-spacing: -4px;
    }
    .code span {
      font-family: 'Fraunces', serif;
      font-style: italic;
      font-weight: 300;
      color: var(--lilas);
    }
    .message {
      font-size: 18px;
      color: var(--mid);
      font-weight: 500;
      margin-bottom: 8px;
    }
    .sub {
      font-size: 14px;
      color: var(--low);
      line-height: 1.7;
      margin-bottom: 40px;
    }
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 12px 24px;
      background: var(--ink);
      color: var(--white);
      border-radius: 10px;
      font-size: 14px;
      font-weight: 600;
      text-decoration: none;
      font-family: 'Plus Jakarta Sans', sans-serif;
      transition: opacity 0.15s;
    }
    .btn:hover { opacity: 0.8; }
    .dots {
      position: fixed;
      inset: 0;
      pointer-events: none;
      opacity: 0.4;
      background-image: radial-gradient(circle, #00000014 1px, transparent 1px);
      background-size: 32px 32px;
      z-index: -1;
    }
    .bar {
      position: fixed;
      top: 0; left: 0; right: 0;
      height: 3px;
      background: var(--lilas);
      opacity: 0.6;
    }
  </style>
</head>
<body>
  <div class="bar"></div>
  <div class="dots"></div>
  <div class="container">
    <div class="eyebrow">Erreur</div>
    <div class="code">4<span>0</span>4</div>
    <div class="message">Cette page n'existe pas</div>
    <p class="sub">Le lien est peut-être cassé ou la page a été déplacée.<br>Retourne sur le portfolio pour continuer.</p>
    <a href="/" class="btn">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M19 12H5M12 5l-7 7 7 7"/>
      </svg>
      Retour au portfolio
    </a>
  </div>
</body>
</html>
